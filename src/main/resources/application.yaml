spring:
  main:
    banner-mode: off
  application:
    name: card-service
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=TESTDB;encrypt=false;trustServerCertificate=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:Dur1an!Super$}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}

external:
  risk-api:
    base-url: ${RISK_API_BASE_URL:https://jsonplaceholder.typicode.com}
    timeout-ms: ${RISK_API_TIMEOUT_MS:3000}

logging:
  file:
    name: logs/card-service.log
  level:
    xyz.pakwo.cardservice: INFO
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

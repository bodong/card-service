services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: card-service-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dur1an!Super$"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Dur1an!Super$' -C -Q 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: card-service-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./initdb.sql:/scripts/initdb.sql:ro
    entrypoint: [ "/bin/bash", "-c", "/opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P 'Dur1an!Super$' -C -i /scripts/initdb.sql" ]
    restart: "no"

volumes:
  mssql_data:
